<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Cadastro</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="form-container">
  <form id="cadastroForm" novalidate>

    <div class="form-group">
      <label for="nome">Nome</label>
      <input type="text" id="nome" required minlength="3">
      <span id="nome-error"></span>
    </div>

    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" required>
      <span id="email-error"></span>
    </div>

    <div class="form-group">
      <label for="senha">Senha</label>
      <input type="password" id="senha" required minlength="8">
      <span id="senha-error"></span>
    </div>

    <div class="form-group">
      <label for="confirmar">Confirmar Senha</label>
      <input type="password" id="confirmar" required>
      <span id="confirmar-error"></span>
    </div>

    <button type="submit">Cadastrar</button>

  </form>
</div>

<script src="js/validation.js"></script>
</body>
</html>
